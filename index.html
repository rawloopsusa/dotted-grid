<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive Dotted Grid</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: #000;
  }
  canvas {
    display: block;
    width: 1280px;
    height: 760px;
    cursor: default;
  }
</style>
</head>
<body>
<canvas id="grid" width="1280" height="760"></canvas>
<script>
const canvas = document.getElementById('grid');
const ctx = canvas.getContext('2d');

const WIDTH = 1280;
const HEIGHT = 760;
const BG = '#121212';
const DOT_COLOR = '#5C5C5C';
const SPACING = 28;
const BASE_RADIUS = 1.5;
const MAX_RADIUS = 6;
const EFFECT_RADIUS = 120;

let mouseX = -9999;
let mouseY = -9999;
let isHovering = false;

// Precompute dot positions
const dots = [];
const startX = SPACING / 2;
const startY = SPACING / 2;
for (let y = startY; y < HEIGHT; y += SPACING) {
  for (let x = startX; x < WIDTH; x += SPACING) {
    dots.push({ x, y });
  }
}

// Smooth animated radii
const dotRadii = new Float32Array(dots.length).fill(BASE_RADIUS);

canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  const scaleX = WIDTH / rect.width;
  const scaleY = HEIGHT / rect.height;
  mouseX = (e.clientX - rect.left) * scaleX;
  mouseY = (e.clientY - rect.top) * scaleY;
  isHovering = true;
});

canvas.addEventListener('mouseleave', () => {
  isHovering = false;
  mouseX = -9999;
  mouseY = -9999;
});

function draw() {
  ctx.fillStyle = BG;
  ctx.fillRect(0, 0, WIDTH, HEIGHT);

  ctx.fillStyle = DOT_COLOR;

  const lerpSpeed = 0.15;

  for (let i = 0; i < dots.length; i++) {
    const dot = dots[i];
    const dx = dot.x - mouseX;
    const dy = dot.y - mouseY;
    const dist = Math.sqrt(dx * dx + dy * dy);

    let targetRadius = BASE_RADIUS;

    if (isHovering && dist < EFFECT_RADIUS) {
      const t = 1 - (dist / EFFECT_RADIUS);
      const eased = t * t * (3 - 2 * t); // smoothstep
      targetRadius = BASE_RADIUS + (MAX_RADIUS - BASE_RADIUS) * eased;
    }

    // Lerp toward target
    dotRadii[i] += (targetRadius - dotRadii[i]) * lerpSpeed;

    const r = dotRadii[i];

    ctx.beginPath();
    ctx.arc(dot.x, dot.y, r, 0, Math.PI * 2);
    ctx.fill();
  }

  requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
